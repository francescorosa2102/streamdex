name: YouTube Collector

# Esegue la raccolta YouTube su schedule (anche a PC spento) e committa il CSV.
on:
  schedule:
    # Ogni ~20 minuti, ma a minuti "dispari" (9/29/49) invece che su :00/:20/:40:
    # cosi' si evita la calca dell'ora tonda, dove GitHub accoda milioni di cron
    # e ritarda/salta le run. NB: le run schedulate restano comunque best-effort:
    # GitHub puo' ritardarle di 15-45 min o saltarle sotto carico. E' normale,
    # non e' un errore di configurazione.
    - cron: "9,29,49 * * * *"
  workflow_dispatch:   # permette anche l'avvio manuale dal tab "Actions"

# Serve per poter committare il CSV aggiornato nel repo.
permissions:
  contents: write

# Evita che due esecuzioni si sovrappongano (i push si darebbero fastidio).
concurrency:
  group: youtube-collector
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repository
        uses: actions/checkout@v4

      - name: Installa Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installa le dipendenze
        run: pip install -r youtube/requirements.txt

      - name: Esegui il collector (una raccolta)
        env:
          # La chiave arriva dal GitHub Secret, MAI dal codice.
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python youtube/youtube_collector.py --once

      - name: Committa il CSV aggiornato
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add youtube/youtube_data.csv
          if git diff --staged --quiet; then
            echo "Nessuna modifica al CSV: niente da committare."
          else
            git commit -m "Aggiorna youtube_data.csv [skip ci]"
            git pull --rebase --autostash
            git push
          fi
